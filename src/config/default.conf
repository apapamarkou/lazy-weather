# lazy-weather default configuration
# Copy to ~/.config/lazy-weather/config and edit as needed.
#
# Lines starting with # are comments.
# Format: KEY=value  (no spaces around =)

# ── Cities ────────────────────────────────────────────────────────────────────
# Comma-separated list of cities shown in the fzf picker.
CITIES=London,Tokyo,New York,Paris,Sydney

# Default city used when no fzf picker is available.
DEFAULT_CITY=London

# ── Units ─────────────────────────────────────────────────────────────────────
# m = metric (Celsius, km/h) | u = USCS (Fahrenheit, mph)
UNITS=m
# ── Cache ─────────────────────────────────────────────────────────────────────
# TTL in seconds (default: 1800 = 30 minutes)
CACHE_TTL=1800

# Directory for cache files (default: /tmp)
CACHE_DIR=/tmp

# ── Mini mode format (wttr.in format string) ──────────────────────────────────
# %t = temperature, %C = condition, %h = humidity, %w = wind
# See: https://wttr.in/:help
MINI_FORMAT=%t %C

# ── Forecast days (0–3) ───────────────────────────────────────────────────────
# 0 = current conditions only
# 1 = today, 2 = 2-day, 3 = 3-day forecast
FORECAST_DAYS=3

# ── Glyph version ─────────────────────────────────────────────────────────────
# narrow — ASCII-safe glyphs, aligned in standard console fonts (recommended)
# wide   — Unicode weather emoji (may misalign in some terminals)
WTTR_VERSION=narrow
